plugins {
    // 1. MUST be library, NOT application
    id 'com.android.library' 
}

android {
    namespace 'com.yebba.services'
    compileSdk 34

    defaultConfig {
        // 2. DELETE 'applicationId' - Libraries are not allowed to have one
        minSdk 24
        
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // Basic Android stuff for your background services
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    
    // Firebase (Shared across all apps)
    implementation platform('com.google.firebase:firebase-bom:32.7.0')
    implementation 'com.google.firebase:firebase-database'
    implementation 'com.google.firebase:firebase-auth'
}
