name: YEBBA Ecosystem Builder

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # Build all 4 modules at once
    - name: Assemble All APKs
      run: ./gradlew assembleDebug

    - name: Upload YEBBA Store APK
      uses: actions/upload-artifact@v4
      with:
        name: yebba-store-debug
        path: yebba-store/build/outputs/apk/debug/yebba-store-debug.apk

    - name: Upload YEBBA Chat APK
      uses: actions/upload-artifact@v4
      with:
        name: yebba-chat-debug
        path: yebba-chat/build/outputs/apk/debug/yebba-chat-debug.apk

    - name: Upload YEBBA Search APK
      uses: actions/upload-artifact@v4
      with:
        name: yebba-search-debug
        path: yebba-search/build/outputs/apk/debug/yebba-search-debug.apk

    - name: Upload YEBBA Services APK
      uses: actions/upload-artifact@v4
      with:
        name: yebba-services-debug
        path: yebba-services/build/outputs/apk/debug/yebba-services-debug.apk
