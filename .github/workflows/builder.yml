name: YEBBA Ecosystem Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.4
        chmod +x gradlew

    - name: Build YEBBA Services
      run: ./gradlew :yebba-services:assembleDebug --no-daemon

    - name: Build YEBBA Store
      run: ./gradlew :yebba-store:assembleDebug --no-daemon

    - name: Build YEBBA Chat
      run: ./gradlew :yebba-chat:assembleDebug --no-daemon

    - name: Build YEBBA Search
      run: ./gradlew :yebba-search:assembleDebug --no-daemon

    - name: Upload APKs
      uses: actions/upload-artifact@v4
      with:
        name: YEBBA-Ecosystem-APKs
        path: |
          **/build/outputs/apk/debug/*.apk
