name: YEBBA Ecosystem Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to manually trigger the build from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # Building apps individually to prevent RAM timeout and show clear logs
    - name: Build YEBBA Services
      run: ./gradlew :yebba-services:assembleDebug

    - name: Build YEBBA Store
      run: ./gradlew :yebba-store:assembleDebug

    - name: Build YEBBA Chat
      run: ./gradlew :yebba-chat:assembleDebug

    - name: Build YEBBA Search
      run: ./gradlew :yebba-search:assembleDebug

    # Uploading the results so you can download them to your Redmi 10
    - name: Upload APKs
      uses: actions/upload-artifact@v4
      with:
        name: YEBBA-Ecosystem-APKs
        path: |
          yebba-services/build/outputs/apk/debug/*.apk
          yebba-store/build/outputs/apk/debug/*.apk
          yebba-chat/build/outputs/apk/debug/*.apk
          yebba-search/build/outputs/apk/debug/*.apk
