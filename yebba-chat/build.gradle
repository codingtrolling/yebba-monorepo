plugins {
    // Only use the Java-compatible Android plugin
    id 'com.android.application'
    // Add this if you are using Google Services (Firebase)
    id 'com.google.gms.google-services' 
}

android {
    // Change this for each app: com.yebba.store, com.yebba.search, etc.
    namespace 'com.yebba.chat' 
    compileSdk 34

    defaultConfig {
        // Change this for each app to match the namespace
        applicationId "com.yebba.chat"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    // This helps avoid conflicts with duplicate library files in the APK
    packagingOptions {
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
        }
    }
}

dependencies {
    // Ecosystem Connection: Link to your Services module
    implementation project(':yebba-services')

    // Core Android Libraries
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.recyclerview:recyclerview:1.3.2' // 🔥 Essential for Chat Lists
    implementation 'androidx.cardview:cardview:1.0.0'       // 🔥 Essential for Chat Bubbles

    // Firebase (Using BOM to keep versions in sync)
    implementation platform('com.google.firebase:firebase-bom:32.7.0')
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.firebase:firebase-auth'
    implementation 'com.google.firebase:firebase-database'  // Realtime DB
    implementation 'com.google.firebase:firebase-firestore' // 🔥 Added Firestore
    implementation 'com.google.firebase:firebase-storage'   // For sending images/voice

    // Glide (If your chat shows user photos or sent images)
    implementation 'com.github.bumptech.glide:glide:4.16.0'
    annotationProcessor 'com.github.bumptech.glide:compiler:4.16.0'

    // Testing
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
